<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BREAKOUT NEON</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #070714;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      user-select: none;
    }
    canvas { display: block; cursor: none; }
  </style>
</head>
<body>
<canvas id="canvas"></canvas>
<script>
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
const W = 480, H = 680;
canvas.width = W; canvas.height = H;

function resizeCanvas() {
  const s = Math.min(window.innerWidth / W, window.innerHeight / H);
  canvas.style.width  = (W * s) + 'px';
  canvas.style.height = (H * s) + 'px';
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// ─── State ────────────────────────────────────────────────────────────────────
let state         = 'menu'; // menu | scorehistory | playing | paused | confirmquit | wavetransition | gameover
let prevGameState = 'playing';
let quitSel       = 0;
let score         = 0;
let lives         = 3;
let wave          = 1;
let waveTimer     = 0;
let newRecord     = false;
let recordNotifTimer = 0;
let hiScore       = parseInt(sessionStorage.getItem('breakout_hiScore') || '0');
let scoreHistory  = JSON.parse(sessionStorage.getItem('breakout_scoreHistory') || '[]');
let menuIndex     = 0;
const MENU_ITEMS  = ['NEW GAME', 'SCORE HISTORY'];

// ─── Paddle ───────────────────────────────────────────────────────────────────
const PAD = { w: 100, h: 14, x: W/2-50, y: H-55, speed: 9, targetX: W/2-50, glow: 0 };

// ─── Ball ─────────────────────────────────────────────────────────────────────
const BALL_RADIUS = 8;
const balls = [];

function hexToRgbStr(hex) {
  return `${parseInt(hex.slice(1,3),16)},${parseInt(hex.slice(3,5),16)},${parseInt(hex.slice(5,7),16)}`;
}

function ballSpeedForWave(w) { return 3.0 + w * 0.15; }

function makeBall(attached = true, color = null) {
  const spd    = ballSpeedForWave(wave);
  const rgbStr = color ? hexToRgbStr(color) : '140,170,255';
  return {
    x: PAD.x + PAD.w / 2, y: PAD.y - BALL_RADIUS - 2,
    vx: spd * (Math.random() < 0.5 ? 1 : -1), vy: -spd,
    r: BALL_RADIUS, trail: [], attached, color, rgbStr,
  };
}

// ─── Bricks ───────────────────────────────────────────────────────────────────
const BCOLS = 10, BROWS = 7, BPAD = 5;
const BWIDTH  = (W - 30 - (BCOLS-1)*BPAD) / BCOLS;
const BHEIGHT = 18, BOFF_X = 15, BOFF_Y = 75;

const ROW_PALETTE = [
  ['#ff2d55','#ff2d55'], ['#ff6f00','#ff9800'], ['#ffd600','#ffee00'],
  ['#00c853','#69f0ae'], ['#00b0ff','#64d8ff'], ['#7c4dff','#b388ff'],
  ['#e040fb','#ea80fc'],
];

let bricks = [];

function hpForRow(r, w) {
  if (w <= 4) return 1;
  if (r === 0) return Math.min(1 + Math.floor((w-4)/3), 3);
  if (r === 1) return w >= 8 ? 2 : 1;
  return 1;
}

const BRICKS_START = 22;  // bricks on wave 1
const BRICKS_STEP  = 6;   // added per wave
const BRICKS_MAX   = 60;  // hard cap (out of BCOLS*BROWS = 70)

function initBricks() {
  bricks = [];
  const target     = Math.min(BRICKS_START + (wave - 1) * BRICKS_STEP, BRICKS_MAX);
  const skipChance = Math.max(0, 1 - target / (BCOLS * BROWS));
  for (let r = 0; r < BROWS; r++) {
    for (let c = 0; c < BCOLS; c++) {
      if (Math.random() < skipChance) continue;
      const hp  = hpForRow(r, wave);
      const idx = r * BCOLS + c;
      bricks.push({
        x: BOFF_X + c*(BWIDTH+BPAD), y: BOFF_Y + r*(BHEIGHT+BPAD),
        w: BWIDTH, h: BHEIGHT,
        alive: true, hp, maxHp: hp,
        color: ROW_PALETTE[r][0], gcolor: ROW_PALETTE[r][1],
        flash: 0, shakeX: 0, shakeY: 0,
        score: (BROWS - r) * 10 * wave,
        drop: null,
        appearAt: Math.floor(idx / (BCOLS * BROWS) * 60),
      });
    }
  }
}

// ─── Drops ────────────────────────────────────────────────────────────────────
const DROP_TYPES = ['plus', 'bomb', 'thunder', 'minus'];
const DROP_CFG = {
  plus:    { symbol: '+',  color: '#69f0ae', glow: '#00c853' },
  bomb:    { symbol: '✕',  color: '#ff5577', glow: '#ff2d55' },
  thunder: { symbol: '⚡', color: '#ffd600', glow: '#ff6f00' },
  minus:   { symbol: '−',  color: '#64d8ff', glow: '#00b0ff' },
};
let drops = [];

function planWaveDrops() {
  const chosen = DROP_TYPES.filter(() => Math.random() < 0.38);
  if (chosen.length === 0) return;
  const candidates = bricks.filter(b => b.alive);
  if (candidates.length === 0) return;
  const shuffled = candidates.slice().sort(() => Math.random() - 0.5);
  chosen.forEach((type, i) => { if (i < shuffled.length) shuffled[i].drop = type; });
}

function spawnDrop(brick) {
  const cfg = DROP_CFG[brick.drop];
  drops.push({
    x: brick.x + brick.w / 2, y: brick.y + brick.h / 2,
    vy: 2.5, type: brick.drop,
    symbol: cfg.symbol, color: cfg.color, glow: cfg.glow,
    w: 30, h: 20,
  });
}

function applyDrop(drop) {
  if (drop.type === 'plus') {
    const spd = ballSpeedForWave(wave);
    balls.push({
      x: drop.x, y: drop.y,
      vx: spd * (Math.random() < 0.5 ? 1 : -1), vy: -spd,
      r: BALL_RADIUS, trail: [], attached: false,
      color: DROP_CFG.plus.color, rgbStr: hexToRgbStr(DROP_CFG.plus.color),
    });
    beep(880, 0.12, 'sine', 0.1);
  } else if (drop.type === 'bomb') {
    lives--;
    shakeAmt = 9;
    beep(120, 0.35, 'sawtooth', 0.1);
    if (lives <= 0) { saveToSession(); state = 'gameover'; }
  } else if (drop.type === 'thunder') {
    const MAX_SPD = 10;
    for (const b of balls) {
      const spd = Math.hypot(b.vx, b.vy);
      const ns  = Math.min(spd * 1.4, MAX_SPD);
      b.vx *= ns / spd; b.vy *= ns / spd;
    }
    beep(660, 0.1, 'square', 0.08);
  } else if (drop.type === 'minus') {
    const MIN_SPD = 1.8;
    for (const b of balls) {
      const spd = Math.hypot(b.vx, b.vy);
      const ns  = Math.max(spd * 0.7, MIN_SPD);
      b.vx *= ns / spd; b.vy *= ns / spd;
    }
    beep(220, 0.12, 'square', 0.07);
  }
}

// ─── Particles ────────────────────────────────────────────────────────────────
const particles = [];

function spawnParticles(x, y, color, n = 18) {
  for (let i = 0; i < n; i++) {
    const a = (Math.PI*2*i)/n + (Math.random()-0.5)*0.8;
    const s = 1.5 + Math.random()*4.5;
    particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s,
      life: 1, decay: 0.018+Math.random()*0.025, size: 1.5+Math.random()*3.5, color });
  }
}

function spawnSparks(x, y, color) {
  for (let i = 0; i < 6; i++) {
    const a = (Math.PI*2*i)/6 + Math.random();
    const s = 2 + Math.random()*3;
    particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s,
      life: 0.7, decay: 0.05, size: 1, color });
  }
}

// ─── Screen shake ─────────────────────────────────────────────────────────────
let shakeAmt = 0;

// ─── Input ────────────────────────────────────────────────────────────────────
const keys = {};
let mouseX = null, mouseY = null, mouseDown = false;

document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === ' ' || e.key === 'Enter') onAction();
  if (e.key === 'ArrowUp'    && state === 'menu') menuIndex = (menuIndex-1+MENU_ITEMS.length) % MENU_ITEMS.length;
  if (e.key === 'ArrowDown'  && state === 'menu') menuIndex = (menuIndex+1) % MENU_ITEMS.length;
  if (e.key === 'ArrowLeft'  && state === 'confirmquit') quitSel = 0;
  if (e.key === 'ArrowRight' && state === 'confirmquit') quitSel = 1;
  if ((e.key === 'q' || e.key === 'Q') && (state === 'playing' || state === 'paused')) {
    prevGameState = state; quitSel = 0; state = 'confirmquit';
  }
  if ((e.key === 'y' || e.key === 'Y') && state === 'confirmquit') state = 'menu';
  if ((e.key === 'n' || e.key === 'N') && state === 'confirmquit') state = prevGameState;
  if (e.key === 'p' || e.key === 'P') onPause();
  if (e.key === 'Escape') {
    if (state === 'confirmquit')  state = prevGameState;
    else if (state === 'scorehistory') state = 'menu';
    else onPause();
  }
  if ((e.key === 'b' || e.key === 'B') && state === 'scorehistory') state = 'menu';
  e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mouseX = (e.clientX - r.left) * (W / r.width);
  mouseY = (e.clientY - r.top)  * (H / r.height);
});
canvas.addEventListener('mousedown', () => { mouseDown = true;  onAction(); });
canvas.addEventListener('mouseup',   () => { mouseDown = false; });

function onAction() {
  if (state === 'menu') { const h = getMenuItemAtMouse(); selectMenuItem(h !== -1 ? h : menuIndex); return; }
  if (state === 'scorehistory')  { state = 'menu';        return; }
  if (state === 'gameover')      { state = 'menu';        return; }
  if (state === 'confirmquit') {
    const h = getQuitButtonAtMouse(), sel = h !== -1 ? h : quitSel;
    state = sel === 1 ? 'menu' : prevGameState; return;
  }
  if (state === 'paused')         { state = 'playing'; return; }
  if (state === 'wavetransition') return;
  if (state === 'playing') {
    const attached = balls.find(b => b.attached);
    if (attached) attached.attached = false;
  }
}

function onPause() {
  if (state === 'playing') state = 'paused';
  else if (state === 'paused') state = 'playing';
}

// ─── Audio ────────────────────────────────────────────────────────────────────
let ac = null;
function getAC() { if (!ac) ac = new (window.AudioContext || window.webkitAudioContext)(); return ac; }
function beep(freq, dur, type = 'square', vol = 0.08) {
  try {
    const a = getAC(), osc = a.createOscillator(), g = a.createGain();
    osc.connect(g); g.connect(a.destination);
    osc.type = type; osc.frequency.value = freq;
    g.gain.setValueAtTime(vol, a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + dur);
    osc.start(); osc.stop(a.currentTime + dur);
  } catch (_) {}
}

// ─── Persistence ──────────────────────────────────────────────────────────────
function saveToSession() {
  const isNewRecord = score > hiScore;
  hiScore = Math.max(hiScore, score);
  scoreHistory.unshift({
    score, wave,
    date: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric' }),
    record: isNewRecord,
  });
  if (scoreHistory.length > 5) scoreHistory.pop();
  sessionStorage.setItem('breakout_hiScore', hiScore);
  sessionStorage.setItem('breakout_scoreHistory', JSON.stringify(scoreHistory));
}

// ─── Menu helpers ─────────────────────────────────────────────────────────────
function getMenuItemAtMouse() {
  if (mouseY === null) return -1;
  for (let i = 0; i < MENU_ITEMS.length; i++) {
    const cy = 320 + i * 70;
    if (mouseY >= cy-25 && mouseY <= cy+25 && mouseX >= W/2-140 && mouseX <= W/2+140) return i;
  }
  return -1;
}

const QUIT_YES = { x: W/2-100, y: H/2+30, w: 80, h: 40 };
const QUIT_NO  = { x: W/2+20,  y: H/2+30, w: 80, h: 40 };

function getQuitButtonAtMouse() {
  if (mouseX === null || mouseY === null) return -1;
  const hit = b => mouseX >= b.x && mouseX <= b.x+b.w && mouseY >= b.y && mouseY <= b.y+b.h;
  if (hit(QUIT_YES)) return 1;
  if (hit(QUIT_NO))  return 0;
  return -1;
}

function selectMenuItem(idx) {
  if (idx === 0) startGame();
  if (idx === 1) state = 'scorehistory';
}

// ─── Game control ─────────────────────────────────────────────────────────────
function startGame() {
  score = 0; lives = 3; wave = 1;
  newRecord = false; recordNotifTimer = 0;
  balls.length = 0; particles.length = 0; drops.length = 0;
  PAD.x = W/2 - PAD.w/2;
  balls.push(makeBall(true));
  initBricks();
  planWaveDrops();
  state = 'playing';
}

function nextWave() {
  wave++;
  balls.length = 0; drops.length = 0;
  PAD.x = W/2 - PAD.w/2;
  balls.push(makeBall(true));
  initBricks();
  planWaveDrops();
  waveTimer = 100;
  state = 'wavetransition';
  beep(660,  0.12, 'sine', 0.1);
  setTimeout(() => beep(880,  0.12, 'sine', 0.1),  120);
  setTimeout(() => beep(1100, 0.15, 'sine', 0.1),  240);
  setTimeout(() => beep(1320, 0.22, 'sine', 0.12), 360);
}

// ─── Round rect helper ────────────────────────────────────────────────────────
function rrect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y);
  ctx.arcTo(x+w, y, x+w, y+r, r); ctx.lineTo(x+w, y+h-r);
  ctx.arcTo(x+w, y+h, x+w-r, y+h, r); ctx.lineTo(x+r, y+h);
  ctx.arcTo(x, y+h, x, y+h-r, r); ctx.lineTo(x, y+r);
  ctx.arcTo(x, y, x+r, y, r); ctx.closePath();
}

// ─── Update ───────────────────────────────────────────────────────────────────
function update() {
  if (shakeAmt > 0) shakeAmt *= 0.75;

  if (state === 'wavetransition') {
    waveTimer--;
    if (waveTimer <= 0) state = 'playing';
    return;
  }
  if (state !== 'playing') return;

  if (recordNotifTimer > 0) recordNotifTimer--;
  if (!newRecord && hiScore > 0 && score > hiScore) {
    newRecord = true; recordNotifTimer = 220;
  }

  // Paddle
  if (mouseX !== null) PAD.targetX = mouseX - PAD.w/2;
  if (keys['ArrowLeft']  || keys['a'] || keys['A']) PAD.targetX -= PAD.speed;
  if (keys['ArrowRight'] || keys['d'] || keys['D']) PAD.targetX += PAD.speed;
  PAD.targetX = Math.max(0, Math.min(W - PAD.w, PAD.targetX));
  PAD.x += (PAD.targetX - PAD.x) * 0.25;
  if (PAD.glow > 0) PAD.glow -= 0.05;

  // Balls
  for (let bi = balls.length - 1; bi >= 0; bi--) {
    const b = balls[bi];
    if (b.attached) {
      b.x = PAD.x + PAD.w/2; b.y = PAD.y - b.r - 2; b.trail = []; continue;
    }

    b.trail.push({ x: b.x, y: b.y });
    if (b.trail.length > 14) b.trail.shift();
    b.x += b.vx; b.y += b.vy;

    if (b.x - b.r < 0)  { b.x = b.r;     b.vx =  Math.abs(b.vx); beep(280, 0.06); }
    if (b.x + b.r > W)  { b.x = W - b.r; b.vx = -Math.abs(b.vx); beep(280, 0.06); }
    if (b.y - b.r < 10) { b.y = 10 + b.r; b.vy = Math.abs(b.vy); beep(320, 0.06); }

    // Paddle collision
    if (b.vy > 0 && b.y+b.r >= PAD.y && b.y+b.r <= PAD.y+PAD.h+6 &&
        b.x >= PAD.x-4 && b.x <= PAD.x+PAD.w+4) {
      const rel   = (b.x - (PAD.x + PAD.w/2)) / (PAD.w/2);
      const angle = rel * (Math.PI / 3.2);
      const spd   = Math.hypot(b.vx, b.vy);
      b.vx = spd * Math.sin(angle);
      b.vy = -spd * Math.cos(angle);
      b.y  = PAD.y - b.r;
      PAD.glow = 1;
      beep(440, 0.08, 'square', 0.07);
    }

    // Bottom out
    if (b.y - b.r > H) {
      balls.splice(bi, 1);
      if (balls.length === 0) {
        lives--;
        shakeAmt = 12;
        beep(120, 0.4, 'sawtooth', 0.12);
        if (lives <= 0) { saveToSession(); state = 'gameover'; }
        else balls.push(makeBall(true));
      }
      continue;
    }

    // Brick collisions
    for (const brick of bricks) {
      if (!brick.alive) continue;
      const dx = b.x - Math.max(brick.x, Math.min(b.x, brick.x+brick.w));
      const dy = b.y - Math.max(brick.y, Math.min(b.y, brick.y+brick.h));
      if (dx*dx + dy*dy > b.r*b.r) continue;

      const oL = b.x+b.r - brick.x,        oR = brick.x+brick.w - (b.x-b.r);
      const oT = b.y+b.r - brick.y,        oB = brick.y+brick.h - (b.y-b.r);
      const mn = Math.min(oL, oR, oT, oB);
      if      (mn === oT) { b.vy = -Math.abs(b.vy); b.y = brick.y - b.r; }
      else if (mn === oB) { b.vy =  Math.abs(b.vy); b.y = brick.y+brick.h+b.r; }
      else if (mn === oL) { b.vx = -Math.abs(b.vx); b.x = brick.x - b.r; }
      else                { b.vx =  Math.abs(b.vx); b.x = brick.x+brick.w+b.r; }

      brick.hp--;
      brick.flash = 1;
      brick.shakeX = (Math.random()-0.5)*5;
      brick.shakeY = (Math.random()-0.5)*5;

      if (brick.hp <= 0) {
        brick.alive = false;
        score += brick.score;
        spawnParticles(brick.x+brick.w/2, brick.y+brick.h/2, brick.color, 20);
        beep(600, 0.07, 'square', 0.09);
        if (brick.drop) spawnDrop(brick);
      } else {
        spawnSparks(b.x, b.y, brick.color);
        beep(500, 0.06, 'sine', 0.06);
      }
      break;
    }
  }

  // Particles
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.09; p.vx *= 0.97;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }

  for (const b of bricks) {
    b.flash   = Math.max(0, b.flash - 0.08);
    b.shakeX *= 0.6; b.shakeY *= 0.6;
  }

  // Drops
  for (let i = drops.length - 1; i >= 0; i--) {
    const d = drops[i];
    d.y += d.vy;
    const hw = d.w / 2, hh = d.h / 2;
    if (d.y + hh >= PAD.y && d.y - hh <= PAD.y + PAD.h &&
        d.x + hw >= PAD.x && d.x - hw <= PAD.x + PAD.w) {
      applyDrop(d);
      drops.splice(i, 1);
      continue;
    }
    if (d.y - hh > H) drops.splice(i, 1);
  }

  if (bricks.every(b => !b.alive)) nextWave();
}

// ─── Draw helpers ─────────────────────────────────────────────────────────────
function drawGlowText(text, x, y, color, blur, size, weight = 'bold') {
  ctx.save();
  ctx.textAlign = 'center';
  ctx.font = `${weight} ${size}px "Segoe UI", system-ui, sans-serif`;
  ctx.shadowColor = color; ctx.shadowBlur = blur;
  ctx.fillStyle = '#ffffff'; ctx.fillText(text, x, y);
  ctx.restore();
}

let animT = 0;

function drawBackground() {
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#08091a'); bg.addColorStop(1, '#0c0e22');
  ctx.fillStyle = bg; ctx.fillRect(-10, -10, W+20, H+20);
  ctx.fillStyle = 'rgba(255,255,255,0.018)';
  for (let gx = 20; gx < W; gx += 32)
    for (let gy = 20; gy < H; gy += 32) {
      ctx.beginPath(); ctx.arc(gx, gy, 1, 0, Math.PI*2); ctx.fill();
    }
  const tg = ctx.createLinearGradient(0, 8, W, 8);
  tg.addColorStop(0, 'transparent');
  tg.addColorStop(0.3, 'rgba(120,90,255,0.4)');
  tg.addColorStop(0.7, 'rgba(120,90,255,0.4)');
  tg.addColorStop(1, 'transparent');
  ctx.strokeStyle = tg; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(0, 9); ctx.lineTo(W, 9); ctx.stroke();
}

function drawAnimatedBricks() {
  const t = animT * 0.008;
  for (let r = 0; r < BROWS; r++) {
    for (let c = 0; c < BCOLS; c++) {
      const wv = Math.sin(t + r*0.5 + c*0.3) * 0.5 + 0.5;
      ctx.globalAlpha = 0.05 + wv*0.07;
      ctx.shadowColor = ROW_PALETTE[r][1]; ctx.shadowBlur = 6;
      ctx.fillStyle   = ROW_PALETTE[r][0];
      rrect(BOFF_X + c*(BWIDTH+BPAD), BOFF_Y + r*(BHEIGHT+BPAD), BWIDTH, BHEIGHT, 4);
      ctx.fill();
    }
  }
  ctx.globalAlpha = 1; ctx.shadowBlur = 0;
}

// ─── Draw ─────────────────────────────────────────────────────────────────────
function draw() {
  animT++;
  const sx = shakeAmt > 0.5 ? (Math.random()-0.5)*shakeAmt : 0;
  const sy = shakeAmt > 0.5 ? (Math.random()-0.5)*shakeAmt : 0;
  ctx.save();
  ctx.translate(sx, sy);
  drawBackground();

  if (state === 'menu')         { drawMainMenu();    ctx.restore(); return; }
  if (state === 'scorehistory') { drawScoreHistory(); ctx.restore(); return; }

  // Bricks (with wave-in animation during wavetransition)
  const inTransition = state === 'wavetransition';
  for (const brick of bricks) {
    if (!brick.alive) continue;
    let brickAlpha = 1, dropOff = 0;
    if (inTransition) {
      const prog = Math.max(0, Math.min(1, (100 - waveTimer - brick.appearAt) / 30));
      brickAlpha = prog; dropOff = (1 - prog) * -28;
      if (brickAlpha <= 0) continue;
    }
    const bx = brick.x + brick.shakeX;
    const by = brick.y + brick.shakeY + dropOff;
    const alpha = (0.6 + 0.4 * brick.hp/brick.maxHp) * brickAlpha;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.shadowColor = brick.gcolor;
    ctx.shadowBlur  = brick.flash > 0 ? 22 + brick.flash*14 : 6;
    const gr = ctx.createLinearGradient(bx, by, bx, by+brick.h);
    gr.addColorStop(0, brick.color+'ee'); gr.addColorStop(1, brick.color+'66');
    rrect(bx, by, brick.w, brick.h, 5); ctx.fillStyle = gr; ctx.fill();
    ctx.globalAlpha = alpha * 0.35; ctx.fillStyle = '#ffffff';
    ctx.fillRect(bx+4, by+3, brick.w-8, 3);
    if (brick.maxHp > 1 && brick.hp < brick.maxHp) {
      ctx.globalAlpha = 0.55; ctx.strokeStyle = 'rgba(0,0,0,0.7)'; ctx.lineWidth = 1.5;
      for (let ci = 0; ci < (brick.maxHp - brick.hp); ci++) {
        ctx.beginPath(); ctx.moveTo(bx+10+ci*9, by+4); ctx.lineTo(bx+7+ci*9, by+brick.h-4); ctx.stroke();
      }
    }
    if (brick.drop) {
      const dc = DROP_CFG[brick.drop];
      ctx.globalAlpha = alpha * (0.6 + Math.sin(animT*0.14)*0.4);
      ctx.shadowColor = dc.glow; ctx.shadowBlur = 10; ctx.fillStyle = dc.color;
      ctx.textAlign = 'center';
      ctx.font = `bold 10px "Segoe UI", system-ui, sans-serif`;
      ctx.fillText(dc.symbol, bx + brick.w/2, by + brick.h/2 + 4);
    }
    ctx.restore();
  }

  // Particles
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = p.life * 0.9;
    ctx.shadowColor = p.color; ctx.shadowBlur = 6; ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size * Math.sqrt(p.life), 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // Balls
  for (const b of balls) {
    if (b.attached && Math.floor(animT/18) % 2 === 0) continue;
    for (let ti = 0; ti < b.trail.length; ti++) {
      const t = b.trail[ti];
      const a = (ti / b.trail.length) * 0.35;
      const s = b.r * (ti / b.trail.length) * 0.85;
      ctx.beginPath(); ctx.arc(t.x, t.y, s, 0, Math.PI*2);
      ctx.fillStyle = `rgba(${b.rgbStr},${a})`; ctx.fill();
    }
    ctx.save();
    ctx.shadowColor = b.color || '#90b8ff'; ctx.shadowBlur = 18;
    const bg2 = ctx.createRadialGradient(b.x-2.5, b.y-2.5, 1, b.x, b.y, b.r);
    bg2.addColorStop(0, '#ffffff');
    bg2.addColorStop(0.5, b.color ? `rgba(${b.rgbStr},0.85)` : '#a0c0ff');
    bg2.addColorStop(1,   b.color ? `rgba(${b.rgbStr},0.5)`  : '#4060e0');
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
    ctx.fillStyle = bg2; ctx.fill();
    ctx.restore();
  }

  // Paddle
  ctx.save();
  ctx.shadowColor = PAD.glow > 0.3 ? `rgba(200,180,255,${PAD.glow})` : 'rgba(140,100,255,0.6)';
  ctx.shadowBlur  = 14 + PAD.glow*20;
  const pg = ctx.createLinearGradient(PAD.x, PAD.y, PAD.x+PAD.w, PAD.y);
  pg.addColorStop(0,'#3b30a8'); pg.addColorStop(0.4,'#7c6bff');
  pg.addColorStop(0.6,'#9d8fff'); pg.addColorStop(1,'#3b30a8');
  rrect(PAD.x, PAD.y, PAD.w, PAD.h, 7);
  ctx.fillStyle = pg; ctx.fill();
  ctx.strokeStyle = 'rgba(220,210,255,0.5)'; ctx.lineWidth = 1; ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.fillRect(PAD.x+8, PAD.y+3, PAD.w-16, 3);
  ctx.restore();

  // Falling drops
  for (const d of drops) {
    ctx.save();
    ctx.shadowColor = d.glow; ctx.shadowBlur = 14;
    rrect(d.x - d.w/2, d.y - d.h/2, d.w, d.h, 6);
    ctx.fillStyle = d.color + '44'; ctx.fill();
    ctx.strokeStyle = d.color; ctx.lineWidth = 1.5; ctx.stroke();
    ctx.textAlign = 'center';
    ctx.font = `bold 12px "Segoe UI", system-ui, sans-serif`;
    ctx.shadowColor = d.glow; ctx.shadowBlur = 6; ctx.fillStyle = '#ffffff';
    ctx.fillText(d.symbol, d.x, d.y + 5);
    ctx.restore();
  }

  drawHUD();

  if (state === 'paused')         drawOverlay('PAUSED','#7c6bff','P / ESC / SPACE to resume  ·  Q to quit');
  if (state === 'wavetransition') drawWaveAnnounce();
  if (recordNotifTimer > 0)       drawRecordNotif();

  ctx.restore();
  // drawn outside shake context so mouse hit detection matches visual position
  if (state === 'confirmquit')    drawConfirmQuit();
  if (state === 'gameover')       drawGameOver();
}

// ─── HUD ──────────────────────────────────────────────────────────────────────
function drawHUD() {
  ctx.save();
  ctx.textAlign = 'left';
  ctx.font = '11px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = 'rgba(180,170,255,0.6)';
  ctx.fillText('SCORE', 16, 30);
  ctx.font = 'bold 20px "Segoe UI", system-ui, sans-serif';
  ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 10; ctx.fillStyle = '#ffd700';
  ctx.fillText(score, 16, 50);

  ctx.textAlign = 'center';
  ctx.shadowColor = '#a090ff'; ctx.shadowBlur = 8;
  ctx.fillStyle = 'rgba(200,190,255,0.9)';
  ctx.font = 'bold 14px "Segoe UI", system-ui, sans-serif';
  ctx.fillText(`WAVE ${wave}`, W/2, 38);

  ctx.textAlign = 'right'; ctx.shadowBlur = 0;
  ctx.font = '11px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = 'rgba(180,170,255,0.6)'; ctx.fillText('LIVES', W-16, 30);
  for (let i = 0; i < lives; i++) {
    const lx = W-18-i*20;
    ctx.beginPath(); ctx.arc(lx, 46, 7, 0, Math.PI*2);
    ctx.shadowColor = '#ff5577'; ctx.shadowBlur = 10;
    const lg = ctx.createRadialGradient(lx-2, 44, 1, lx, 46, 7);
    lg.addColorStop(0,'#ff88aa'); lg.addColorStop(1,'#cc2244');
    ctx.fillStyle = lg; ctx.fill();
  }
  if (hiScore > 0) {
    ctx.textAlign = 'center'; ctx.shadowBlur = 0;
    ctx.font = '10px "Segoe UI", system-ui, sans-serif';
    ctx.fillStyle = newRecord ? 'rgba(255,215,0,0.75)' : 'rgba(180,170,255,0.35)';
    ctx.fillText(`BEST  ${hiScore}`, W/2, 52);
  }
  ctx.restore();
}

// ─── Screen functions ─────────────────────────────────────────────────────────
function drawMainMenu() {
  ctx.save();
  drawAnimatedBricks();
  const pulse = 0.85 + Math.sin(animT*0.04)*0.15;
  ctx.save();
  ctx.textAlign = 'center'; ctx.shadowColor = '#7c6bff';
  ctx.shadowBlur = 40*pulse; ctx.font = 'bold 56px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = '#ffffff'; ctx.globalAlpha = pulse;
  ctx.fillText('BREAKOUT', W/2, 145);
  ctx.restore();
  ctx.save();
  ctx.textAlign = 'center'; ctx.shadowColor = '#c0b0ff'; ctx.shadowBlur = 12;
  ctx.font = 'bold 14px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = '#c0b0ff'; ctx.letterSpacing = '8px';
  ctx.fillText('N  E  O  N', W/2, 172);
  ctx.restore();

  const hov = getMenuItemAtMouse();
  if (hov !== -1) menuIndex = hov;
  MENU_ITEMS.forEach((label, i) => {
    const cy = 320 + i*70, isActive = i === menuIndex;
    ctx.save();
    ctx.textAlign = 'center';
    ctx.font = `bold ${isActive ? 28 : 22}px "Segoe UI", system-ui, sans-serif`;
    ctx.fillStyle = isActive ? '#ffffff' : 'rgba(200,190,255,0.6)';
    ctx.shadowColor = '#7c6bff'; ctx.shadowBlur = isActive ? 25 : 0;
    if (isActive) ctx.fillText('▶', W/2-120, cy+9);
    ctx.fillText(label, W/2, cy+9);
    ctx.restore();
  });

  ctx.save();
  ctx.textAlign = 'center';
  ctx.font = '11px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = 'rgba(180,170,255,0.3)';
  ctx.fillText('↑ ↓ navigate  ·  ENTER / CLICK select', W/2, H-50);
  if (hiScore > 0) {
    ctx.fillStyle = 'rgba(180,170,255,0.45)';
    ctx.fillText(`PERSONAL BEST  ${hiScore}`, W/2, H-30);
  }
  ctx.restore();
  ctx.restore();
}

function drawScoreHistory() {
  ctx.save();
  drawGlowText('SCORE HISTORY', W/2, 52, '#ffd700', 18, 24);
  if (scoreHistory.length === 0) {
    ctx.textAlign = 'center'; ctx.font = '16px "Segoe UI", system-ui, sans-serif';
    ctx.fillStyle = 'rgba(200,190,255,0.4)';
    ctx.fillText('No scores yet — play a game!', W/2, H/2);
  } else {
    const rankColors = ['#ffd700','#c0c0c0','#cd7f32','rgba(200,190,255,0.6)','rgba(200,190,255,0.4)'];
    const rowH = Math.min(82, (H-140) / scoreHistory.length);
    scoreHistory.forEach((entry, i) => {
      const s = typeof entry === 'object' ? entry : { score: entry, wave: '?', date: '-' };
      const y = 108 + i*rowH, col = rankColors[i];
      ctx.save();
      ctx.shadowColor = col; ctx.shadowBlur = i < 3 ? 10 : 0;
      ctx.textAlign = 'right';
      ctx.font = `bold ${i===0?26:20}px "Segoe UI", system-ui, sans-serif`;
      ctx.fillStyle = col; ctx.fillText(`${i+1}.`, 68, y);
      ctx.textAlign = 'left';
      ctx.font = `bold ${i===0?30:24}px "Segoe UI", system-ui, sans-serif`;
      ctx.fillText(s.score, 80, y);
      if (s.record || i === 0) {
        ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 10;
        ctx.font = `${i===0?16:13}px sans-serif`;
        ctx.fillText('  ★', 80 + ctx.measureText(String(s.score)).width, y);
      }
      ctx.shadowBlur = 0;
      ctx.font = `${i===0?14:12}px "Segoe UI", system-ui, sans-serif`;
      ctx.fillStyle = 'rgba(200,190,255,0.5)'; ctx.textAlign = 'right';
      ctx.fillText(`WAVE ${s.wave ?? '?'}   ${s.date ?? ''}`, W-40, y);
      if (i < scoreHistory.length-1) {
        ctx.strokeStyle = 'rgba(120,100,220,0.2)'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(40, y+rowH-8); ctx.lineTo(W-40, y+rowH-8); ctx.stroke();
      }
      ctx.restore();
    });
  }
  ctx.save();
  ctx.textAlign = 'center'; ctx.font = '12px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = 'rgba(180,170,255,0.35)'; ctx.fillText('ESC or B to go back', W/2, H-25);
  ctx.restore();
  ctx.restore();
}

function drawConfirmQuit() {
  ctx.save();
  ctx.fillStyle = 'rgba(4,4,18,0.84)'; ctx.fillRect(0, 0, W, H);
  drawGlowText('QUIT TO MENU?', W/2, H/2-55, '#ff9800', 25, 32);
  ctx.save();
  ctx.textAlign = 'center'; ctx.font = '14px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = 'rgba(200,190,255,0.55)';
  ctx.fillText('Your current progress will be lost.', W/2, H/2-12);
  ctx.restore();
  const hovBtn = getQuitButtonAtMouse();
  if (hovBtn !== -1) quitSel = hovBtn;
  [{ label:'YES', id:1, box:QUIT_YES, col:'#ff5577' },
   { label:'NO',  id:0, box:QUIT_NO,  col:'#7c6bff' }].forEach(btn => {
    const active = quitSel === btn.id;
    ctx.save();
    ctx.shadowColor = btn.col; ctx.shadowBlur = active ? 22 : 5;
    rrect(btn.box.x, btn.box.y, btn.box.w, btn.box.h, 8);
    ctx.fillStyle = active ? btn.col+'44' : 'rgba(255,255,255,0.04)'; ctx.fill();
    ctx.strokeStyle = active ? btn.col : 'rgba(255,255,255,0.15)'; ctx.lineWidth = 1.5; ctx.stroke();
    ctx.textAlign = 'center'; ctx.font = 'bold 18px "Segoe UI", system-ui, sans-serif';
    ctx.fillStyle = active ? '#ffffff' : 'rgba(200,190,255,0.5)';
    ctx.shadowBlur = active ? 10 : 0;
    ctx.fillText(btn.label, btn.box.x+btn.box.w/2, btn.box.y+btn.box.h/2+7);
    ctx.restore();
  });
  ctx.save();
  ctx.textAlign = 'center'; ctx.font = '11px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = 'rgba(180,170,255,0.3)';
  ctx.fillText('← → navigate  ·  ENTER / CLICK confirm  ·  ESC cancel', W/2, H/2+105);
  ctx.restore();
  ctx.restore();
}

function drawOverlay(title, color, subtitle) {
  ctx.save();
  ctx.fillStyle = 'rgba(4,4,18,0.7)'; ctx.fillRect(0, 0, W, H);
  drawGlowText(title, W/2, H/2, color, 35, 50);
  ctx.font = '15px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = 'rgba(200,190,255,0.6)'; ctx.textAlign = 'center';
  ctx.fillText(subtitle, W/2, H/2+40);
  ctx.restore();
}

function drawGameOver() {
  ctx.save();
  ctx.fillStyle = 'rgba(4,4,18,0.78)'; ctx.fillRect(0, 0, W, H);
  drawGlowText('GAME OVER', W/2, H/2-65, '#ff2d55', 40, 52);
  if (newRecord) {
    const pb = 0.7 + Math.sin(animT*0.1)*0.3;
    ctx.save();
    ctx.globalAlpha = pb; ctx.textAlign = 'center';
    ctx.font = 'bold 17px "Segoe UI", system-ui, sans-serif';
    ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 20; ctx.fillStyle = '#ffd700';
    ctx.fillText('★  NEW PERSONAL BEST  ★', W/2, H/2-20);
    ctx.restore();
  }
  ctx.save();
  ctx.textAlign = 'center';
  ctx.font = 'bold 28px "Segoe UI", system-ui, sans-serif';
  ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 15; ctx.fillStyle = '#ffd700';
  ctx.fillText(`SCORE  ${score}`, W/2, H/2 + (newRecord ? 20 : 10));
  ctx.font = '14px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = 'rgba(200,190,255,0.5)'; ctx.shadowBlur = 0;
  ctx.fillText(`WAVE  ${wave}   |   BEST  ${hiScore}`, W/2, H/2 + (newRecord ? 48 : 38));
  ctx.restore();
  const cta = 0.6 + Math.sin(animT*0.07)*0.4;
  ctx.save();
  ctx.globalAlpha = cta; ctx.textAlign = 'center';
  ctx.font = 'bold 18px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = 'rgba(200,190,255,0.9)';
  ctx.fillText('CLICK TO RETURN TO MENU', W/2, H/2+88);
  ctx.restore();
  ctx.restore();
}

function drawWaveAnnounce() {
  const prog  = 1 - waveTimer / 100;
  // fade in over first 25%, hold, fade out over last 25%
  const alpha = prog < 0.25 ? prog/0.25 : prog > 0.75 ? 1 - (prog-0.75)/0.25 : 1;
  ctx.save();
  ctx.globalAlpha = Math.max(0, Math.min(1, alpha));
  ctx.textAlign = 'center';
  ctx.shadowColor = '#69f0ae'; ctx.shadowBlur = 35;
  ctx.font = 'bold 46px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = '#ffffff'; ctx.fillText(`WAVE ${wave}`, W/2, H/2-20);
  ctx.font = '18px "Segoe UI", system-ui, sans-serif';
  ctx.shadowBlur = 12; ctx.fillStyle = '#69f0ae';
  ctx.fillText('GET READY', W/2, H/2+22);
  ctx.restore();
}

function drawRecordNotif() {
  const t = recordNotifTimer / 220;
  // hold full for first 75%, then fade out
  const alpha = t > 0.25 ? 1 : t / 0.25;
  ctx.save();
  ctx.globalAlpha = Math.max(0, Math.min(1, alpha));
  ctx.textAlign = 'center';
  ctx.font = 'bold 15px "Segoe UI", system-ui, sans-serif';
  ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 18; ctx.fillStyle = '#ffd700';
  ctx.fillText('★  NEW PERSONAL BEST  ★', W/2, H/2);
  ctx.restore();
}

// ─── Loop ─────────────────────────────────────────────────────────────────────
function loop() { update(); draw(); requestAnimationFrame(loop); }
requestAnimationFrame(loop);
</script>
