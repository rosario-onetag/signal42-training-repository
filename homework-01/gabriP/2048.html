<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2048</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, 'Helvetica Neue', sans-serif;
      background: #faf8ef;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
      min-height: 100vh;
      user-select: none;
    }

    header {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 460px;
      margin-bottom: 14px;
    }

    h1 {
      font-size: 52px;
      font-weight: bold;
      color: #776e65;
      margin-right: auto;
    }

    .score-box {
      background: #bbada0;
      border-radius: 6px;
      padding: 6px 14px;
      text-align: center;
      min-width: 72px;
    }

    .score-box .label {
      font-size: 10px;
      font-weight: bold;
      letter-spacing: 1px;
      color: #eee4da;
    }

    .score-box .value {
      font-size: 20px;
      font-weight: bold;
      color: #fff;
    }

    button.new-game {
      background: #8f7a66;
      color: #f9f6f0;
      border: none;
      border-radius: 6px;
      padding: 10px 16px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      white-space: nowrap;
    }

    button.new-game:hover { background: #7a6a58; }

    .grid-wrap {
      position: relative;
    }

    .grid {
      background: #bbada0;
      border-radius: 10px;
      padding: 12px;
      display: grid;
      grid-template-columns: repeat(4, 100px);
      grid-template-rows: repeat(4, 100px);
      gap: 12px;
      cursor: grab;
    }

    .grid:active { cursor: grabbing; }

    .cell {
      width: 100px;
      height: 100px;
      border-radius: 6px;
      background: rgba(238, 228, 218, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      font-weight: bold;
      color: #776e65;
    }

    .tile-2    { background: #eee4da; }
    .tile-4    { background: #ede0c8; }
    .tile-8    { background: #f2b179; color: #f9f6f0; }
    .tile-16   { background: #f59563; color: #f9f6f0; }
    .tile-32   { background: #f67c5f; color: #f9f6f0; }
    .tile-64   { background: #f65e3b; color: #f9f6f0; }
    .tile-128  { background: #edcf72; color: #f9f6f0; font-size: 28px; }
    .tile-256  { background: #edcc61; color: #f9f6f0; font-size: 28px; }
    .tile-512  { background: #edc850; color: #f9f6f0; font-size: 28px; }
    .tile-1024 { background: #edc53f; color: #f9f6f0; font-size: 22px; }
    .tile-2048 { background: #edc22e; color: #f9f6f0; font-size: 22px; }
    .tile-high { background: #3c3a32; color: #f9f6f0; font-size: 18px; }

    .overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(238, 228, 218, 0.75);
      border-radius: 10px;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      z-index: 10;
    }

    .overlay.show { display: flex; }

    .overlay h2 {
      font-size: 46px;
      font-weight: bold;
      color: #776e65;
    }

    .overlay .btn-group {
      display: flex;
      gap: 12px;
    }

    .overlay button {
      background: #8f7a66;
      color: #f9f6f0;
      border: none;
      border-radius: 6px;
      padding: 12px 22px;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
    }

    .overlay button:hover { background: #7a6a58; }
  </style>
</head>
<body>

  <header>
    <h1>2048</h1>
    <div class="score-box">
      <div class="label">SCORE</div>
      <div class="value" id="score">0</div>
    </div>
    <div class="score-box">
      <div class="label">BEST</div>
      <div class="value" id="best">0</div>
    </div>
    <button class="new-game" onclick="newGame()">Nuova partita</button>
  </header>

  <div class="grid-wrap">
    <div class="grid" id="grid"></div>

    <div class="overlay" id="ov-win">
      <h2>Hai vinto!</h2>
      <div class="btn-group">
        <button onclick="continueGame()">Continua</button>
        <button onclick="newGame()">Nuova partita</button>
      </div>
    </div>

    <div class="overlay" id="ov-over">
      <h2>Game Over!</h2>
      <button onclick="newGame()">Riprova</button>
    </div>
  </div>

  <script>
    let grid, score, bestScore = 0, winShown;

    function newGame() {
      grid = Array.from({length: 4}, () => Array(4).fill(0));
      score = 0;
      winShown = false;
      hide('ov-win');
      hide('ov-over');
      spawnTile();
      spawnTile();
      render();
    }

    function continueGame() {
      hide('ov-win');
    }

    function show(id) { document.getElementById(id).classList.add('show'); }
    function hide(id) { document.getElementById(id).classList.remove('show'); }

    // --- Core logic ---

    function slideLeft(row) {
      const tiles = row.filter(v => v !== 0);
      for (let i = 0; i < tiles.length - 1; i++) {
        if (tiles[i] === tiles[i + 1]) {
          tiles[i] *= 2;
          score += tiles[i];
          tiles.splice(i + 1, 1);
        }
      }
      while (tiles.length < 4) tiles.push(0);
      return tiles;
    }

    function transpose(g) {
      return g[0].map((_, c) => g.map(r => r[c]));
    }

    function move(dir) {
      let g = grid.map(r => [...r]);

      if (dir === 'up'    || dir === 'down')  g = transpose(g);
      if (dir === 'right' || dir === 'down')  g = g.map(r => [...r].reverse());

      g = g.map(slideLeft);

      if (dir === 'right' || dir === 'down')  g = g.map(r => [...r].reverse());
      if (dir === 'up'    || dir === 'down')  g = transpose(g);

      if (JSON.stringify(g) === JSON.stringify(grid)) return;

      grid = g;
      spawnTile();
      render();
      checkState();
    }

    function checkState() {
      if (!winShown && grid.flat().includes(2048)) {
        winShown = true;
        show('ov-win');
        return;
      }
      if (isGameOver()) show('ov-over');
    }

    function isGameOver() {
      for (let r = 0; r < 4; r++)
        for (let c = 0; c < 4; c++) {
          if (grid[r][c] === 0) return false;
          if (c < 3 && grid[r][c] === grid[r][c + 1]) return false;
          if (r < 3 && grid[r][c] === grid[r + 1][c]) return false;
        }
      return true;
    }

    function spawnTile() {
      const empty = [];
      for (let r = 0; r < 4; r++)
        for (let c = 0; c < 4; c++)
          if (grid[r][c] === 0) empty.push([r, c]);
      if (!empty.length) return;
      const [r, c] = empty[Math.floor(Math.random() * empty.length)];
      grid[r][c] = Math.random() < 0.9 ? 2 : 4;
    }

    // --- Render ---

    function tileClass(val) {
      if (!val) return '';
      return val <= 2048 ? `tile-${val}` : 'tile-high';
    }

    function render() {
      document.querySelectorAll('.cell').forEach((cell, i) => {
        const val = grid[Math.floor(i / 4)][i % 4];
        cell.textContent = val || '';
        cell.className = 'cell ' + tileClass(val);
      });
      document.getElementById('score').textContent = score;
      if (score > bestScore) {
        bestScore = score;
        document.getElementById('best').textContent = bestScore;
      }
    }

    // --- Input: keyboard ---

    const KEYS = {
      ArrowLeft: 'left', ArrowRight: 'right', ArrowUp: 'up', ArrowDown: 'down',
      a: 'left', d: 'right', w: 'up', s: 'down',
      A: 'left', D: 'right', W: 'up', S: 'down',
    };

    document.addEventListener('keydown', e => {
      const dir = KEYS[e.key];
      if (dir) { e.preventDefault(); move(dir); }
    });

    // --- Input: mouse drag ---

    let dragStart = null;

    document.addEventListener('mousedown', e => {
      dragStart = { x: e.clientX, y: e.clientY };
    });

    document.addEventListener('mouseup', e => {
      if (!dragStart) return;
      const dx = e.clientX - dragStart.x;
      const dy = e.clientY - dragStart.y;
      dragStart = null;
      if (Math.abs(dx) < 30 && Math.abs(dy) < 30) return;
      move(Math.abs(dx) > Math.abs(dy)
        ? (dx > 0 ? 'right' : 'left')
        : (dy > 0 ? 'down' : 'up'));
    });

    // --- Init ---

    const gridEl = document.getElementById('grid');
    for (let i = 0; i < 16; i++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      gridEl.appendChild(cell);
    }

    newGame();
  </script>
</body>
</html>
