version: "3.9"

services:
  backend:
    volumes:
      - ./backend:/app
    environment:
      CORS_ORIGINS: '["*"]'
    command: >
      sh -c "alembic upgrade head &&
             python -m app.seed &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api/v1
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
